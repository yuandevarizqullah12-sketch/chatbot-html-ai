<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>AI Chat · Modern Assistant</title>
  <link rel="stylesheet" href="style.css">
  <!-- Google Identity Services -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <!-- Markdown (optional, for better formatting) -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <!-- Font Awesome (optional for icons) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
  <!-- Modal Auth -->
  <div class="modal-overlay" id="authModal">
    <div class="modal-card">
      <div class="modal-icon">
        <i class="fas fa-robot"></i>
      </div>
      <h2>Welcome to AI Chat</h2>
      <p>Sign in to continue or try a demo</p>
      <div class="auth-buttons">
        <button class="btn-google" id="googleSignInBtn">
          <i class="fab fa-google"></i> Sign in with Google
        </button>
        <div class="divider">or</div>
        <button class="btn-demo" id="demoBtn">
          <i class="fas fa-user-friends"></i> Try Demo (Guest)
        </button>
      </div>
      <p class="terms">By continuing, you agree to our <a href="#">Terms</a> and <a href="#">Privacy</a>.</p>
    </div>
  </div>

  <!-- Main App -->
  <div class="app" id="app" style="display: none;">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <button class="new-chat-btn" id="newChatBtn">
          <i class="fas fa-plus"></i> New Chat
        </button>
        <button class="close-sidebar" id="closeSidebarBtn">
          <i class="fas fa-times"></i>
        </button>
      </div>
      <div class="chat-history" id="chatHistory">
        <!-- history items will appear here -->
      </div>
      <div class="user-info">
        <img src="" alt="avatar" class="avatar" id="userAvatar">
        <span class="user-name" id="userName"></span>
        <button class="logout-btn" id="logoutBtn">
          <i class="fas fa-sign-out-alt"></i>
        </button>
      </div>
    </aside>

    <!-- Main Chat Area -->
    <main class="main">
      <header class="chat-header">
        <button class="menu-toggle" id="menuToggle">
          <i class="fas fa-bars"></i>
        </button>
        <div class="mode-switch">
          <button class="mode-btn active" data-mode="ai">AI Only</button>
          <button class="mode-btn" data-mode="search">AI + Search</button>
        </div>
        <div class="model-badge">
          <i class="fas fa-brain"></i> llama-3.1-8b
        </div>
      </header>

      <div class="chat-messages" id="chatMessages">
        <!-- messages will be injected here -->
      </div>

      <div class="typing-indicator" id="typingIndicator">
        <span></span><span></span><span></span>
      </div>

      <div class="input-container">
        <textarea id="userInput" placeholder="Ask anything..." rows="1"></textarea>
        <button id="sendButton" disabled>
          <i class="fas fa-paper-plane"></i>
        </button>
      </div>
    </main>
  </div>

  <!-- Toast Notifications -->
  <div class="toast" id="errorToast"></div>

  <script src="script.js"></script>
</body>
</html>
