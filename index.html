<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>AI Chat + Search</title>
  <link rel="stylesheet" href="style.css">
  <!-- Google Identity Services -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <!-- Markdown library -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
  <!-- Authentication Modal -->
  <div class="modal-overlay" id="authModal">
    <div class="modal-container">
      <div class="modal-header">
        <h2>Welcome to AI Chat</h2>
        <p>Sign in to continue</p>
      </div>
      <div class="modal-body">
        <button class="google-btn" id="googleSignInBtn">
          <svg width="20" height="20" viewBox="0 0 24 24">
            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
          </svg>
          Sign in with Google
        </button>
        <div class="modal-divider">or</div>
        <button class="demo-btn" id="demoBtn">Try Demo (Guest)</button>
      </div>
      <div class="modal-footer">
        <p class="terms">By continuing, you agree to our Terms and Privacy Policy.</p>
      </div>
    </div>
  </div>

  <!-- Main App (hidden until auth) -->
  <div class="app" id="app" style="display: none;">
    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <button class="new-chat-btn" id="newChatBtn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 5v14M5 12h14"/>
          </svg>
          New Chat
        </button>
        <button class="close-sidebar-btn mobile-only" id="closeSidebarBtn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M18 6L6 18M6 6l12 12"/>
          </svg>
        </button>
      </div>
      <div class="chat-history" id="chatHistory">
        <!-- History items will be injected here -->
      </div>
      <div class="user-info" id="userInfo">
        <img src="" alt="" class="user-avatar" id="userAvatar">
        <span class="user-name" id="userName"></span>
        <button class="logout-btn" id="logoutBtn">Logout</button>
      </div>
    </div>

    <!-- Main Chat Area -->
    <div class="main">
      <!-- Header -->
      <header class="chat-header">
        <button class="menu-toggle" id="menuToggle">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 12h18M3 6h18M3 18h18"/>
          </svg>
        </button>
        <div class="mode-selector">
          <button class="mode-btn active" data-mode="ai">AI Only</button>
          <button class="mode-btn" data-mode="search">AI + Search</button>
        </div>
        <div class="header-right">
          <span class="model-badge">llama-3.1-8b</span>
        </div>
      </header>

      <!-- Messages Container -->
      <div class="chat-messages" id="chatMessages"></div>

      <!-- Typing Indicator -->
      <div class="typing-indicator" id="typingIndicator">
        <span></span><span></span><span></span>
      </div>

      <!-- Input Area -->
      <div class="input-area">
        <textarea id="userInput" placeholder="Message AI..." rows="1"></textarea>
        <button id="sendButton" disabled>
          <svg viewBox="0 0 24 24" width="24" height="24">
            <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z" fill="currentColor"/>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <!-- Error Toast -->
  <div class="error-toast" id="errorToast">Something went wrong</div>

  <script type="module" src="script.js"></script>
</body>
</html>
